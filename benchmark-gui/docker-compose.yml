version: "3.8"

services:
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn fastapi_app:combined_app --host 0.0.0.0 --port 50071
    ports:
      - "50071:50071"
    volumes:
      - ./scripts:/app/scripts
      - ./results:/app/results
      - ./logs:/app/logs
      - ./backend/app.py:/app/app.py
      - ./backend/fastapi_app.py:/app/fastapi_app.py
      - ./graid-bench.conf:/app/graid-bench.conf
      - /dev:/dev
    environment:
      - PYTHONUNBUFFERED=1
      - BENCHMARK_API_KEY=${BENCHMARK_API_KEY:-}
      - BENCHMARK_ALLOWED_ORIGINS=${BENCHMARK_ALLOWED_ORIGINS:-http://localhost:50072,http://127.0.0.1:50072}
    networks:
      - graid-network
    privileged: true
    pid: "host"
    restart: unless-stopped

  frontend:
    # Change to image: your-account/graid-bench-frontend:v1.0 after push
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "50072:3000"
    environment:
      - REACT_APP_API_URL=
    depends_on:
      - fastapi
    networks:
      - graid-network
    restart: unless-stopped

networks:
  graid-network:
    driver: bridge
